# Send prefix
set-option -g prefix C-b
unbind-key C-b
bind-key C-b send-prefix

# Use Alt-arrow keys to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Window resize
bind-key -n C-S-Up resize-pane -U 10
bind-key -n C-S-Down resize-pane -D 10
bind-key -n C-S-Left resize-pane -L 10
bind-key -n C-S-Right resize-pane -R 10
# Shift arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Mouse mode
setw -g mouse on
set -s set-clipboard external
set -as terminal-features ',*:hyperlinks'

# Set easier window split keys
bind-key v split-window -h
bind-key h split-window -v

# MISC
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g status-position bottom

# Easy config reload
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded."

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

setw -g mode-keys vi

set -g @continuum-restore 'on'

##### Gruber Darker tmux styling

# Gruber Darker palette (from a common reference)
# bg-1   #101010
# bg     #181818
# bg+1   #282828
# bg+2   #453d41
# fg     #e4e4ef
# red    #f43841
# green  #73c936
# yellow #ffdd33
# quartz #95a99f
# blue   #96a6c8
# purple #9e95c7

# Truecolor (recommended)
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*-256color:Tc"

# --- Core UI ---
set -g status-position bottom
set -g status-style "bg=#181818,fg=#e4e4ef"          # status bar base
set -g message-style "bg=#282828,fg=#e4e4ef"         # messages
set -g message-command-style "bg=#282828,fg=#ffdd33" # command prompt
set -g mode-style "bg=#453d41,fg=#ffdd33"            # copy-mode selection

# Pane borders
set -g pane-border-style "fg=#453d41"
set -g pane-active-border-style "fg=#ffdd33"

# --- Windows list ---
setw -g window-status-style "bg=#181818,fg=#95a99f"
setw -g window-status-current-style "bg=#282828,fg=#ffdd33,bold"
setw -g window-status-activity-style "bg=#181818,fg=#f43841"
setw -g window-status-bell-style "bg=#f43841,fg=#181818,bold"

setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# --- Status content (simple, no special glyphs) ---
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[fg=#ffdd33,bold] #S #[default]"
set -g status-right "#[fg=#95a99f]#(whoami)@#H #[fg=#453d41]| #[fg=#73c936]%Y-%m-%d #[fg=#96a6c8]%H:%M #[default]"

# Optional: highlight search matches in copy-mode
set -g copy-mode-match-style "bg=#282828,fg=#ffdd33"
set -g copy-mode-current-match-style "bg=#ffdd33,fg=#181818"

run '~/.tmux/plugins/tpm/tpm'
